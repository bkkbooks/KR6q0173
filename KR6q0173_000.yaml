front:
  text: 千松筆記序觀釋迦老子四十九年利生之談把一片肝腸打迭得乾乾淨淨以應萬機那有許多齷齪塞人腸肚教人成佛四十九年中止用一片圓融無礙不思議清淨心為辨才示人安身立命處猶龍神現於雲端往來神變雲行雨施善能觀者見龍真體不善觀者謂紙墨文字故如來文非文也如來語非語也轉變神化言言真體語語流輝故云四十九年未嘗曾說一字才見世尊肝腸潔淨令人直下會取不受人瞞具眼者那肯食人糟粕檢人涕吐如雲門才見釋迦指天指地便云我當時若見一棒打死與狗子吃就把世尊底掀開用出自家面目那肯食人殘羮剩飯所以悟有非常才能超世也須是個人使得未徹玄宗浪言見諦將欲昧人實以自昧咨其胸臆徒滑唇吻不能了明出佛之機言不越心心不越語心言豈是兩法懸崖撒手未肯承當直下知歸自然透脫學者漫自隨文逐義舉世呌囂徵逐不醒如吸狂泉不知佛祖垂言直示本體盡徹纖疑縱橫如意可窺心佛之宗入利津而不染唯從自己胸襟流出以應世間智刃才揮纖疑頓斷為世間之道亦可為出世間之道亦可把世間法與出世間法融作一團和作一塊作世間法亦可作出世間法亦可離世間法無出世間法可得離出世間法無世間法可得然雖如是亦可於世間法內檢出出世間法於出世間法內檢出世間法才不溷亂亦不儱侗方為具眼踏翻聖賢窠臼掀開佛祖家風可以入魔可以入佛不被世間法與出世間法縛灑灑脫脫才成個解脫道人玉既琢而韞璞劍已淬而含輝是以念念中見一切衆生成佛佛有成否亦非佛矣心有古今亦非心矣是故釋迦老子一生活計不厭之談示於衆生不可於說字上更下注腳為心佛可也
