body:
  text: 諦觀如來千古之雄文如覩如來千古之心然則五天正語充滿閻浮鳥跡圓音彌難穿鑿直餐梵響何待唐言紙墨文字間虗圓妙應不自為形而形已露本來無跡而跡已彰言過視聽之外理出思議之表文以表心心為文顯世人唯以文字而求心孰知心露皆為文字故如來血脉披析詳盡剖露無餘如禹之治水淮陰之用兵萃然一出每變每奇縱橫殺活莫敢當其鋭者唯一劍之鋒𨦵莫能攖觸把千七百陳爛葛藤一一斬斷見聞俱泯直向千劫已前與一切人相見故禹之治水若九河會流激流懸瀑不可挽截者皆如來一智而流出十二分教以十二分教會歸於一心圓機妙論巧入深中數十百萬言籍雲舒皆貫空有之美獨脫於文字之表懸解於文字之外皆為活句絶無文字氣息即文字而非文字即言詞而非言詞直欲令人會取千劫已前慎勿迷其本而棄其源也故橫說豎說不離其本啐同時默會經旨唯一語之橫流孰為宗乎孰為教乎孰為心乎孰為佛乎孰頓孰漸揮灑如意擊吐壺歌洋洋乎其盈耳煥爛兮其溢目紛紛欣欣兮其獨樂當此之時不知誰為諸佛誰是衆生而不以善止其又何他求焉是故谷答樵謳花迎鳥笑擴而充之安蛇足矣故琅邪覺云汾陽先師道汾陽門下有一西河師子當門踞坐但有來者即便咬殺作何方便入得汾陽門見得汾陽人琅邪這裏也有踞地師子若有來者即自喪身失命作何方便而入琅邪門見琅琊人此兩轉語諸人還檢點得出方為擇法眼若不如是且無安身立命處矣故吐筆端趨風傳響疑滯豁然非得至人安能坐斷舌頭了却千生百劫大事如千里之馬馭以孫陽過都歷塊直流星一抹哉禪宗合論世尊明星以後拈華以前四十九年婆心太切向人嘵嘵所說數十百萬言唯人能讀其死句而不能讀其活句如來吐納虗空提醒人處直指開口無擬議處無滲漏處無穿鑿處無用心處如龍藏海似虎藏林風雲叱咤百怪震驚世尊唯對明星所得遮一段光景將來露在諸人面前令一切人大家檢點看還為如來所說十二分之教耶還為露自己之心耶既是如來所說之教云何又言四十九年未嘗曾說一字此乃如來自悟曠劫已前面目渾淪吐出本地風光天機渾成如來妙相而無咀囁之痕不廢纖毫之力和聲吐露全體示於衆生圓機頓顯乎詞收來放去妙用縱橫心佛衆生渾然齊致真妄物我舉一全收而無聖凡之異無缺無餘融萬法於一心了千心於一語樵歌牧唱聲色縱橫炳然齊印權實雙行五派分宗三乘教相義將安寄推其鋒鍔則萬變千奇窮理盡用渾然無端了無絲毫滲漏亦無一法可得自然活潑潑地轉漉漉地不離如來舌端上只是要一切人透得遮著子人人自有一段超然樂處挾日月而驅風雷舌端遊戲為古為律時露清新為宗為教水截蛟螭陸斷兕虎杜絶好新樂異深防穿鑿之徒千卷之靈奇如秋毫處於滄海是以不灑點墨盡皆必吐之英韜頴埋鋒極盡生人之態果人受諸天之供沾一味而味味具足點銅鐵為黃金抽神奇為臭腐以道觀言以言觀道可以見道可以窮經可以勵志可以察天地可以知鬼神可以通百家開頂門之隻眼放無上之寶光孰得孰失何去何從故初祖云淨智妙圓體自空寂如是功德不與世求須是真參實悟方是用處而不拖泥帶水向上玄旨不作露布葛藤且道不落死活句如何道看如來所說三乘十二分教猶海水一味窮高極深激而為濤回而為瀾震而為雷噴而為雨能隨龍而化三千世界皆如來舌上之波瀾汪洋談藝匠心而出酬機訓答一旦當機淋漓吐露觸途無礙乍分乍合無損滄海之勢了無緣影著之乎胸中現之乎眉睫亦無殊勝名言朗然獨脫唯此虗空活潑潑地稜稜風骨融融若春如衡在鑑風雷在握而應當世之務其神何所不之是故般若現前本來具足不假修為真智無邊真心無定毫無滲漏人人分上各各具足羅山云玄門無法不立紀綱如王寶劍鋒鋩不可攖觸之則瞎却人眼無一語而不單提向上無一言而不全體獨露所以釋迦老子於一切處成等正覺若有血氣漢向這裏著一隻眼便見自己七縱八橫絲髮不移踏著自家本命元辰元不從人而得須是猛著精彩看夫觀於教者而不能觀於心能觀於心者亦能會於教教從心之所流如來示於心而說於教衆生迷於教而不識於心教為表顯之法心為說教之主識於心而會於教者更何以加一字於心乎亦無有一字可當情千言片語覿面論心了然無疑怡然無怖猶不能自信而且各持所見終不足以愜初心比之為敲門磚門既闢而安用之乎何不觀如來舌端上放五色電光還謂如來之真相乎樂說不窮任其索隱泛聲香而不住括虗空而為量迷測其源罔知其末苟能知心則萬法皆從我出清虗簡勝如聞鄭衛之音意於言外千途一轍念念非別乾坤寥廓豎立非他一念現前應口而吐捐盡形骸全體皆露本地風光覿體相見故萬世以下而囁嚅者得其本焉經之摛掞旨超文外讀如來語者直須了然頓悟故李長者云無邊剎境自他不隔於毫端十世古今始終不離於當念而神融骨洽則曩劫之疑渙然氷釋矣詞彩則揭其精華音韻則響其諧調是以學來學去并學亦間窮如來之教亦不存一字於胸中亦不多讀一字亦不少讀一字故云治世語言皆順正法但拔出衆生處處貪著推靡破執不得不無徹名相之藩籬露真心於唇吻若作道理見解終有一點不灑灑在教中有梵語唐言顯說密說皆如來設教之權變化之法世尊撫運以梵典而開宗示心為教言為智炬之輝虗其襟者挹其遺風漱其流者味其餘津為祛識之利劍截妄之寶刀億曳法蠡之響而無穿鑿之寶言有華梵之分心無唐梵之別故心之與語猶利之與刃而語之於心猶刃之於利利之名非刃也刃之名非利也捨利不可無刃捨刃不可無利未聞刃沒而利存利沒而刃在也故言無唐梵之分心有思議之格豈有唐言而可詮梵語而不可詮乎窮緣盡照顯密一心皆如來說法之權以融心之妙如孤鶴盤空神龍戲海懶菴曰近世學者不悟斯旨意謂禪宗別是一種法門以禪為宗者非其教以教為宗者非其禪遂成兩家之說互相詆呰譊譊不能自已噫所聞淺陋一至於此非愚即狂甚可嘆息也巖頭云夫唱教須一一從自己胸襟間吐得出來與人為榜樣但於聲色前不被萬境惑亂故知經文中亦有向上一路如高山出雲羣峰吐溜抑何奇也百川之水終歸於海出雲流潤以澤天下其何快如之則彌廓彌虗如濤如風著不得纖毫礙以顯於心鼓山云十二分教唱不得凡聖攝不得今古流不得言句該不得如來以千古之靈奇吐之胸中秀媚清新為古為律時露合璧難分楮玉若不會此則為世諦流布即此鋒鋩而直如太虗纖雲了無所有洞山初和尚云舉唱宗乘闡揚大教須得法眼精明方能鑑辨緇素切緣真妄一源水乳同器到此難分洞山尋常以心中眼觀身外相觀之又觀乃辨真僞夫善知識者驅耕夫之牛奪飢人之食直須心境一如第八識斷一刀心無滲漏方有少分相應故胸中如吞吐長江骨法齊等未嘗不為通身吐露灑灑不為法縛不可留纖介緣影于胸次乎臨濟大師云你若達得萬法無生心如幻化更無一塵一法處處清淨無佛無衆生無古無今得者便得不勒時節亦無修證無得無失一切時中更無別法設有一法過此我說如夢如幻入一切差別境不能回換未曾離一念隨處清淨道我解禪解道辨似懸河皆是造地獄業若真正學道人不見世間過急切要求真正見解若達真心悟性圓明方始了畢只如十二分教皆是表顯之說學者不會便向表顯名句上生解皆是依倚落在因果未免三界生死一念心能自在隨處解脫如是解得方始好看教如來語皆正言正言豈可穿鑿或於巧辨或示密言別是一種風骨絶無煙火氣息語言世味翩翩塵埃之外百鳥爭鳴松風和韻皆助如來談柄誠恐以紙墨文字之講求皆為思議之言而非如來之正說也故巖頭和尚云大統綱中須識句若不識句難作話會百不思時喚作正句學不足以窺無始之宗言無思以應當世之務盡徹纖疑縱橫如意夫人自具於眼方識如來教中真旨如來之語言言活潑語語無定隨緣應答如幻如化如珠走盤豈能執捉皆露心之妙今人執定世間文字看法而擬如來之語豈知如來之語非世間文字也豈可隨語而生解乎故華嚴經云謂知一切法即心自性成就慧身不由他悟是以法華經云出衆生處處貪著故智者大師讀至是曰真精進是名真法供養處豁然大悟還知智者大師悟箇甚麼道理方知全部皆一旋陀尼無穿鑿無用心無斷絶無擬議處豈得漫自隨其言句而鑿之乎故教中四無礙者事無礙理無礙事理無礙獨事事無礙之理最難悟者非是華嚴一經有此四種無礙之理諸經皆然此乃如來說法之要綱也故智者大師讀法華而悟遍大地皆法華也永明大師云凡關一切言詮於圓宗所示皆為未了文字性離即是解脫迷一切諸法之性向心外取法而起文字見者今還將文字對治示其真實若悟諸法本源則不見有文字絲毫發現方知一切法即心自性則境智融通色空俱泯當此親證圓明之際入斯一法平等之時又有何法是教而可離何法是祖而可重何法是頓而可取何法是漸而可非則知皆是識心分別所以祖佛善巧密布權門廣備教乘方便逗會才得見性當下無心藥病俱消教觀咸息出宗鏡録是故不可執定是非之說而辨於教語無是非之性無是非之念亦無是非之辨故語之所發乎未分是非之先亦無有是非之辨者乃如來之正念衆生未變之真千劫已前之面目若辨言說是非好醜則非真面目皆是識心分別計度故云但有言說都無實義心無真妄真妄起於識想一念緣起未分之先孰為佛乎孰為心乎孰為法乎唯用之能迅無心分別無心緣念念念皆心獨不能剪情縛於見聞之初乾識浪於愛憎之表神理易悟結習難忘迷則妄生悟則妄滅妄無妄源豎無初際既無有始豈得有終本際不可得故生死無有始臨濟大師云沿流不止問如何真照無邊說似他離相離名人不稟吹毛用了急須磨理須頓悟習須漸除大聖人出來提醒人處直指衆生千劫已前不曾變壞這段光明時時搬弄泥團須自識取莫為沒溺於紙墨文字間一離文字不啻猢孫失樹便無可安身立命處矣殊不知文字而不能攝者形骸之外肝膽盡露縱橫馳驟放去收來隱隱照映人處徒與世間人談世間法不復知有向上事在無痕跡處可以檢點無心識處可以認取故琴之道尊根於音古與聲器之源略窺其倪指法音節調燮之妙不詭於正而喚醒千古人心直欲摶取虗空握筆揮灑縱橫奇屈千古合節如伏櫪老驥意氣橫溢穿雲之鵠目無萬里便覺天機激觸露出通身手眼昔公明宣學於曾子三年不讀書曾子曰宣而居參之門三年不學何也公明宣曰安敢不學宣見夫子居宮庭親在叱咤之聲未嘗至於犬馬宣說之學而未能宣見夫子而應賓客恭儉而不懈惰宣說之學而未能宣見夫子而居朝庭嚴臨之下而不毀傷宣說之學而未能宣說此三者學而未能宣安敢不學而居夫子之門乎曾子避席謝之曰參不及宣其學而已楞嚴擊節明沙門大韶著門人智睿録夫參學之士須要自得徹底掀翻豈可就人吻角吃野狐涎唾他日盡是閻羅老子乞鐵棒的有甚交涉須從自己真參實悟處透將出來那時才好把釋迦老子野狐涎唾盡底撇向東洋大海朕跡不留從自胸中嘔出了無凝滯如珠走盤不留影跡馳騁當世神睴自顧靡不貫彼精微收之毫端放彌六合須於文字中點出如來之眼光明遍照無一語而非世尊全體獨露無一字而非釋迦老子喪身命處也蓋生平學力未精不能藻鑑而照破生死之根露出父母未生已前一段光景來人人自謂握靈蛇之珠家家自謂抱荊山之玉茫然不能照物無隱無從不能洞識幽微究其所真見無迷悟心見無分靡不知有於言煥然如水之質漫言浩蕩自成其文蓋非語言文字理通故也聖胤流輝懸河瀉辨非真見之光明涅槃元清淨體者乎今之學者不能履順而遊性乘佛理而御心道眼未明世出世間常露於前不能分別而為千古之靈骨照破生死之根方知真藥現前不能分別者氣爽神聰才情風韻若處太虗之中飄飄然而露千古之玄風以應世間神融骨洽必須悟此而視千百世如同一日潔然於內渾然於外不被世間語言文字之所障礙是以博採精微陶容妙義會契如來之旨不費纖毫之力能令學人析理開神吐棄精華千秋片語道波口海非諸佛之真見能與於此乎未嘗知其清虗之體素骨通靈不可染污者一字不鑿則心鏡彌朗聲同金石皆自丰神透露妙辨縱橫而非楞嚴寂滅海中流出者故心莫之能為隱者吾人之所不能隱於心矣是以心見之所難分也而世無能隱之心心無能隱之見心之所露而不能自知者未有能知於心也暗昧得耀乎光明孰為見以全露直言其歸趣而已窮萬物之根源別千靈之作用方可照明真見烏謂自己吐出楞嚴大定耶是以翦截浮辭弘至道舉其閎綱原始要終得其真趣莫尋枝葉若江河之流渙然氷釋蓋有南威之容乃可論於淑媛有龍淵之利乃可議於斷割敷揚厥旨驅托羣言發前人之未發泄如來之真髓可補於將來靡得而詳焉昔王敦素問覺範禪師曰寶公讖語視千百年如一日此何道而至之覺範曰清明在躬志氣如神有物將至其兆必先孔子語也莫非倒想倒想若滅洞見三世寶公豈有倒想乎敦素拊掌笑曰美哉之論然則倒想寧有道乎大佛頂即諸佛之果體也反衰世之陵夷續衆生之慧命無古無今庶不異於真源即心即用未嘗不露於項相一切衆生不能析如來之見不能知如來之頂而顯諸佛之神用也用衆生之語言也是衆生自受用之法門也安身立命處也世尊點出諸佛之眼放出頂光也妙奢摩它三摩禪那這一妙字吐出與世味同研庸言庸行與善惡是非溶作一團和作一塊掀翻理窟倒翻情境天然真趣自然神化不假雕琢在世而不為世之所遷出世而不能融於世者真淳不剖為之涅槃元清淨體是諸佛之本源流而不散用而不分故世尊全體作用於四十九年之中未嘗散亂者唯一妙字而無知故謂之奢摩它也而無明故謂之三摩禪那正三觀中謂之體真止識未動故謂之隨緣方便止不思議故謂之不著二邊止是復真元未散之果體也淳朴未分之元世尊欲盡大地衆生皆復真元之體若用識之所侵聖德隱矣元明之體失矣非三界而三界分矣無古今而古今別矣無衆生而衆生之相成矣是諸佛而作衆生矣盡大地諸佛即今皆是盡露蠕動含靈之相矣把自己一點真元刳之盡矣唯大聖人出來救之難矣非大聖不能復其真而滅其識完其體矣恐天下人而無有一人能完其心者無一人能全其心而證諸佛之果體也復其本源也入其大定也已證涅槃也識已寂滅也故大聖人出來終不把自己之心而被識所侵故是以許由箕隱老聃守中伏犧畫卦文王發泄盡矣聖哲奔忙魯叟彌縫者世尊以幻化之術而提醒天下人而一切衆生若證自心方知自心皆為幻化而幻化皆為自心者矣是以融萬法於一妙攝盡大地衆生之心盡入奢摩禪那之中故盡大地一切衆生無一時未嘗不析三摩談禪那融真見論三觀何嘗曾住口來最初方便世尊正把衆生日用三昧融於奢摩它中以三摩禪那溶作最初方便作世間法亦可作出世間法亦可溶作一團和作一塊不可分別不可卜度吐將出來未有咀囓之痕者釋迦老子亦用一毫伎倆不得用一毫思唯不得最初發起一念之時各人自家檢點看還能識得千古已前面目否若能認得此念念分別念念透將出來還識得是父母未生已前這段光景者釋迦老子許多臭爛葛藤一毫也用不著亦不能舒一毫伎倆安知一念能知大地衆生盡皆成佛安知三世諸佛之相盡露衆生之一念乎其形隱而能顯其聲露而常藏以非常之人能覩非常之形有非常之眼不從忘想處出將一個未有咀囓之痕的父母未生已前拋向人前止要一切人亦不可囓傷而自用之斬斷人之卜度截斷人無始劫前種子直言之下更不著纖毫擬議放出自己光明照天照地吐電驚雷天壤間更有何物而能至於此耶故釋迦老子亦用一毫伎倆不得天然真趣豈能雕琢心之所露於神生於識心未動之先故用無識之心行於無思之境故不可以識動之所能侵也言無凝滯之思心有能變之識識所動而真則遺矣心有明而礙則立矣明則知而妄則生矣元明之體失矣故曰終日用而不知枉入諸趣者矣是以真心不能用於世不能辨於事彼非所明而明之彼非所知而知故能知於世者非心之所真也是非之彰道之所虧也出於天地至明至理之所非及也唯知吾人之所直言者不可知而為心不可以明而為道是以釋迦老子化機被物唯以辭變而為用也唯觀辭變為如來無礙之辨而為法也而窮天下人之心無有能盡之用而窮如來變化之機是以世尊四十九年自受用之法門未嘗曾說一字而化導衆生用之四十九年未嘗有一法與人者唯以直言其歸趣也而知言之脉這一訣竅達磨所傳如來慧命者勢如懸𮈔世尊未嘗不與道破在般若會上則曰如語者實語者真語者不誑語者不異語者在法華會上以三稱誠諦之語六萬餘言臨完正稱授持佛語唯一直語而為萬世之師者其唯大聖歟非有義於文所可得而言也是以窮盡萬物之言不能以直而為言也言非直而識所侵也故不能定萬物之心而為真也不能測萬物之心而為教也不能融萬物之心而住無思之境也不能化萬物之機而為各各父母未生已前也化柴煮茶一莖茅上燎天赤𦦨常燃萬指叢中法供因緣偶爾苕溪煮作清凉盡成爐鞴鑊湯爐內誰為出手提携猛烈𦦨中何者將薪就熾旃檀寸寸何妨片片將來瓊樹森森豈惜枝枝拈出砍蒼劈翠截玉剖金滿擔携來撲落總非他物縱橫界內刈末全得工夫化燈油這一點光燭三千界法界之幽途直透彌勒之內院恆輝似廣寒宮啓映寶網之千重如杲日當空走金蛇之萬道觸白毫而遍皆成玉色照法相而大地盡作黃金物物騰輝塵塵互入噫莫道不從此處生光盡是得來發𦦨檀那蚤施仍續此明拈出些些莫教常昧祛蟲生佛同源性無高下法身互顯報有升沉形分萬品體列千般彗孛現於微垣災異彰於吳地時當季夏爍石流金萬物茂榮之候松篁吐翠之時弱植同𮮈浮英鬪艷幽姿傲骨蒼素質之標喬木森然羣芳爛熳之莠魔業之唚推雕之剝乃囓乃唚乃柔乃傷衆芳搖落兮盡推彚品之華森然枯槁兮唯挺孤高之幹遭其零悴息歸萎薾天時之道違和地利之宜傷毀未能調叶致降災愆伏願證法相而如屈如曲現三昧兮如囓如唚卸醜形而神通自妙脫業纍而超極樂之仍使松筠含翠卉木芬芳復生蕙以標姿仍挺幹而發莠薦親詎知身類浮萍命均脆草形將物化驚業海之汪洋心乃真常眇畏塗之遙曠於乎法性虗靈慨親恩之罔極幽冥杳隔嗟子道之何申匪憑我佛之洪慈曷導冥中之滯魄於烏投誠梵院達悃覺天一有愧怍之總藉慈悲所憫善來佛子𠃔副齊心塵隨空落正觀第一義天想與虗隕深入妙三摩地無違動止宴坐水月道場不間晨晡成就空華佛事資福寺妙宗下火這個妙宗常在一毫端上放大光明髑髏眼中照天照地今日遺下贓私却在山僧手裡這鶻臭布衫脂膏帽子向人天衆前投入火光三昧燃起燎天赤𦦨放出性空真火走却無角鐵牛跳出金毛獅吼撞倒辨山峰頂嚇得須彌倒走松濤徹底顛狂林木盡皆哮吼百鳥哀鳴山川淚流必竟向何處安身打圓相云却在這裡躲根瞥醜咄象王擺脫黃金䌇飛騰直入雲端走與楞嚴寺性菴下火從來不識娘生鼻今日全然通露出和身跳入太虗空兩眼分明如電徹六十餘年不解尋一朝雲散風前別走却獰龍獨角新縱橫法界顛狂決玉柱雲凝苕溪流截且道性菴上座必竟在何處安身打圓相云昨宵走却玉麒麟翻身跳出黃金窟千松筆記門人智録彌勒像讚這個潑賴沒些頦腮常在街頭慣為乞丐個大肚皮唯餘臭穢內院難容泥犁有在咦若將黑墨染虗空直入地獄如箭射觀音像這個野狐精裝甚癡模樣阿誰寫將來露這醜形狀終日誑衆生禮拜觀音像若還得見伊痛責三十杖達磨像打落牙的腮胡藥不死的剩漢西方不能容汝東土來此何幹慣將他人之物誑人自己無一毫希罕若還撞見難饒劈脊還他便棒普賢讚一個普賢騎個象兩兩分明各一樣普賢騎象象騎人鼻孔元來無兩樣若還檢點得分明各各也要三十杖題楞嚴寺中峰祖師遺笠彩霞聚處結羅紋日落山銜頂露痕雨雪驟時容有笠電雷迅疾乃知君餘生活計雙天目全體風流五色雲唯此百年遺跡在何人惆悵罷殷勤密藏師遺笠時將晴笠護螺紋猶恐神光露頂痕鄉國不居潛世外遺跡儼身分幸存滿月今瞻仰得有圓光孰見聞華雨一龕山寺振師身何處不紛紛挽蓮渠師不知寒暑不知秋歷盡塵緣未得休鴻鴈一聲天外落山流始見水無流與畫工陳居士描盡江山骨還能寫自心試看馳驟處須認筆頭真十二時歌平旦寅徹開兩目自分明最是此時人靜悄從來無客到柴門舒雙足活如麟踏破虗空何處塵相看猿鳥清晨過笑我山居絶比鄰日出卯照用同時無不了金烏覿面沒遮瞞山河大地常皎皎泥牛吼石虎忷海門浪擊紅輪小鯨鯢吞却須彌峰試問禪人幾知曉食時辰水漿寒熱自知親麁麁任緣隨分納年來年老日全貧或時吐或時吞放去收來與麼人不聞亞飯吹音樂到底消磨適楚秦禺中巳白雲笑我無名利空山快樂忘寂喧此時有鳥聲嬌翠莫思量休擬議知音不是等間遇得便逢渠不識渠死生看來真笑具日南午猢孫掛璧能攀舞懸崕撒手真丈夫大地由來無寸土行也麼坐也麼東西南北頻周覩紅光赫赫熾通身珍重時人莫莾鹵日昳未漁人欵乃江邊去擎著獰龍定活烹隨手拈來無不是潑天風毋驚畏潵開羅網包天地等間會得者便宜免使浮塵逐間氣晡時申林風叱咤吼乾坤南來片雨分虹斷北去輕雲擁日輪江岸裂江潮分暮雨瀟瀟到渡津看來白髮身如寉濯足松風行路人日入酉過隙光陰如電走日就月將能幾何要使時常無捨取野鳥歸風篁起林陰無事獨相倚二六時看自在身泥牛吼月西風裏黃昏戌大地茫茫暗似漆棄暗投明總未真明暗何須空饒舌亦無人亦無佛大儂口中吹篳栗炎炎六月雪飄飄辨山峰頂笑不徹人定亥睡熟昏昏主誰在枕子夢裡笑呵呵却是東瓜不成隊露平凝月沉海孤鴻咿啞聲旋乃若能認得這般聲石人夜坐觀自在夜半子山河沒倒主中主風吹屋角人不知茅菴睡在泥團裡月常圓雲正駛石女懷胎牛生駬晝則饑餐夜則眠皇家天子皆如篩雞鳴丑覺來路上驚眠狗泉流風韻瀉秋聲雲深幽徑無人走露光明分好醜赤肉團上縱橫手森羅萬象盡紛紛大地由來不相受除夕楊塢天目分支直奔東山回蝘蜒勢寰雄盤旋拮据數千里叠翠峰巒幾萬壘具區北浸連天碧襟帶長江如迤逶岡巒挺秀唯霞幕巉巖露頂參雲霧數峰旋繞結楊塢懸崕峭壁山頭顧崚嶒玉立勢如屏拱逼奎躔成外護流泉直下水淙淙噴雪飛瓊如白鷺僧房阿閣雲氣連峰頭日月互吞吐蒼霞掩映碧琉璃岸眉橫雪僧無數清珠滙渚有蛟龍巖前怪石如猛虎飄來鍾罄佛聲聲過嶺飛猿哀㵎壑啛啛夜更長松風拂拂晝常吼牧童欵乃不時來或與樵夫相對喁我暫棲止西巖下偶然逢此三十夜也無一物過新年菜虀瓔珞充腸罷瓊枝帶雪燒殘玉嫩蕊先烹未放華不道老來多意興喜逢良夕在烟霞西方詠不識東兮不識西拈來法法盡皆齊彩雲行處分松影紅日鯨吞破浪低青蓮舌現彌陀相白玉毫分寶劍提霎時露出那叱眼孰為生死孰為迷戊辰初度處世幽然渾似夢顛倒縱橫隨世控六十年來奔走忙兩肩荷負皮囊重豈知足下有駒兒婉然運載還飛動馬齒增兮顏漸衰盈頭白雪身無用吾今老兮祇自憐躘踵已覺頭常痛聚墨難描八法書拈來拄杖無能弄西方必定去不通驢胎馬腹憑渠送又吾今老兮頭如雪念念塵心流未滅時常展動娘生手春風笑破虗空口良宵明月太空碧放情寥廓無休歇間時看卷無字經倦來就枕真妙訣人生在世不多時喜得吾生事都畢莫將塵世為大年佛祖尚然眼中屑歲朝今朝盡道添一歲吾道如今減一年增減去來無定數唯能消盡世間緣必須識得緣中主百千萬劫常如然無增無減如何道一句何須用口傳看梅四首萬點蒼山色半青千峰影落在中庭隔簾才覺春風動滿機梅花盡吐馨一枝香染孤峰頂嫩蕊偏教閗雪開虗窗透入花神白滿面春風笑我來懶把羞容嶺畔開潛身影裏照娥眉看來滿臉春嬌媚徹骨氷肌不露懷水底梅玉繡千峰疑瑞雪馨香才覺是寒梅遮閉彩毫唯映白鷺飛猶自帶春回山行道中笑指山頭不露峰白雲行處絶狐踪舉頭見有飛鴻過穿透雲山幾萬重一到溪山月正白芒鞋踏破太虗碧柱杖橫肩星斗明夜深劍吐光芒赤平分風色在烟霞彩雲深鎖蒼苔石俯仰乾坤吾道寬雁聲喚醒人間客病中行腳一笠翩翩湖海遊孤雲野寉猜誰留古來行腳應如此竭盡精神始得休踏破草鞋方到底掀開雲霧露全眸指揮自覺千虹斷談笑初驚五嶽秋林雨紛紛點緑苔晚霞片片映窗來階前竹色稍雲碧庭外輕風捲霧回嗟我世緣何日盡栖遲㵎壑且忘懷倘然有日乘鸞去笑指虗空便擊雷送監寺東遊碧漲苕溪春漫流主人撥棹向東遊青山兩岸相隨往白鷺洲邊破浪頭舟行苕上水滿溪頭月滿流魚龍無個不吞喉才逢禹級三層浪吐出光明萬里秋牧牛詞這牛兒身強力健幾人能解牽騎為貪堤上緑草嫩籬籬只管尋芳逐翠奔馳去不𮨇傾危爭知道山遙路僻回首到家遲牧童今有意繩頭謹束鼻䌇高提入泥入水終是不隨伊莫教去嘯傲長堤忽驚起萬里雲飛恐踹破千頃玻璃還來吼太虗雪中行乾坤已自露真形那道輕飄雪未停卓立千峰誰著眼蒼山萬點逐流行登辨山頂足下山頭不露尖雲眠石吼已多年莫教踏破松稍月驚散霞飛萬里天秋日懷題一嘯乾坤遍地秋白雲黃葉滿滄洲霜天雁過聲留影曉日鯨吞光滿浮石隱孤峰銜月吼霞飛萬里勢含鰍芙渠翠色誰為畫留與人間作話頭即事兩眉已染雪霜琅千古恆心未得馴一片彩雲皆內境何時得到月霜輪窗前笑弄筆淋漓那道縱橫千古奇風骨飄飄誰自得虗空點點畫人眉
